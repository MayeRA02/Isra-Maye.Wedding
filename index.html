<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Israel & Mayersi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Isra & Maye — Un Pacto Delante de Dios</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
 <div class="container">
  <!-- Partículas de luz -->
  <canvas id="bokeh"></canvas>
  <div class="light-flares"></div>

  <!-- Overlay elegante / panel central -->
  <div class="overlay-panel">
    <h1>Israel & Mayersi</h1>
    <p class="intro-text">
      Hemos decidido celebrar nuestro matrimonio de manera íntima.<br>
      Sin embargo, hemos preparado esta experiencia digital<br>
      para que puedas ser testigo de nuestro pacto delante de Dios.<br>
      Esta será nuestra ceremonia virtual.
    </p>

    <div class="countdown">
      <p>La ceremonia comienza en…</p>
      <div class="timer">
        <span id="days">00</span> Días
        <span id="hours">00</span> Horas
        <span id="minutes">00</span> Minutos
        <span id="seconds">00</span> Segundos
      </div>
    </div>

    <button id="enterBtn">Comenzar ceremonia</button>
  </div>
</div>

  <audio autoplay loop id="bg-music">
    <source src="assets/audio/The Cinematic Orchestra - To Build a Home - Lyrics.mp3" type="audio/mp3">
  </audio>

  <script src="assets/js/countdown.js"></script>
  <script src="assets/js/bokeh.js"></script>
  <script src="assets/js/light-flares.js"></script>
</body>
</html>
