<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Israel & Mayersi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div class="container">
    <canvas id="bokeh" aria-hidden="true"></canvas>

    <div class="overlay"> 
      <div class="light-flares" aria-hidden="true"></div>

      <div class="overlay-panel" role="main">
        <h1>Israel & Mayersi</h1>

        <p class="intro-text">
          Hemos decidido celebrar nuestro matrimonio de manera íntima.<br>
          Sin embargo, hemos preparado esta experiencia digital<br>
          para que puedas ser testigo de nuestro pacto delante de Dios.<br>
          Esta será nuestra ceremonia virtual.
        </p>

        <div class="countdown" aria-live="polite" aria-atomic="true">
          <p>La ceremonia comienza en…</p>
          <div class="timer" role="status">
            <span id="days">00</span> Días
            <span id="hours">00</span> Horas
            <span id="minutes">00</span> Minutos
            <span id="seconds">00</span> Segundos
          </div>
        </div>

        <button id="enterBtn" aria-label="Comenzar ceremonia" style="display:none">
          Comenzar ceremonia
        </button>
      </div>
    </div>
  </div>

  <audio id="bg-music" loop>
    <source src="assets/audio/to-build-a-home.mp3" type="audio/mpeg">
    Tu navegador no soporta audio.
  </audio>

  <!-- Scripts: bokeh y light-flares pueden dibujar elementos; countdown depende del DOM -->
  <script src="assets/js/bokeh.js"></script>
  <script src="assets/js/light-flares.js"></script>
  <script src="assets/js/countdown.js"></script>
</body>
</html>
